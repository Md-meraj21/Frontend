<!-- table stands for table -->
<!-- thead stands for table head  -->
<!-- tbody stands for table body -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>using Table</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
    color: #333;
}

table {
    width: 100%;
    max-width: 600px;
    margin: 20px auto;
    border-collapse: collapse;
    background-color: #fff;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

thead {
    background-color: #ff5722;
    color: white;
}

thead tr {
    border-bottom: 2px solid #ddd;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    border: solid gray;
}

tbody tr:hover {
    background-color: #f1f1f1;
}

    </style>
</head>

<body>
    <Table>
        <thead>
            <tr>
                <td>Name </td>
                <td>Rollno</td>
                <td>batch</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Md Meraj</td>
                <td>123309180021</td>
                <td>B.tech cse </td>
            </tr>
            <tr>
                <td>Osama</td>
                <td>123309180022</td>
                <td>B.tech cse </td>

            </tr>
            <tr>
                <td>Soyeb</td>
                <td>123309180023</td>
                <td>B.tech cse</td>
            </tr>
        </tbody>
    </Table>
</body>

</html>
